<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Progress Hub — BTEC L3 Esports, Exeter College</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F2A4A; --navy-2:#16395F; --paper:#F4F7FA; --card:#FFFFFF;
  --ink:#1B2733; --muted:#5A6B7C; --line:#D8E0E8;
  --accent:#D7263D; --gold:#C77800;
  --pass:#3E6E94; --merit:#C77800; --dist:#6E2FA0; --good:#1E7B4F;
  --radius:12px;
  --font-body:'Inter','Segoe UI',Arial,sans-serif;
  --font-display:'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);line-height:1.55}
button{font-family:inherit;cursor:pointer}
a{color:var(--navy);text-decoration:underline;text-underline-offset:2px}
a:hover{color:var(--accent)}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

.app{display:grid;grid-template-columns:262px 1fr;min-height:100vh}
.rail{background:var(--navy);color:#EAF1F8;display:flex;flex-direction:column}
.rail-brand{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.14)}
.rail-brand .kicker{font-family:var(--font-display);font-weight:700;letter-spacing:.14em;font-size:.7rem;text-transform:uppercase;color:#9FB8D2}
.rail-brand h1{font-family:var(--font-display);font-weight:800;font-size:1.5rem;line-height:1.05;margin-top:4px;text-transform:uppercase}
.rail-brand h1 .lab{color:#FFC24B}
.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-group{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:#7E97B3;padding:14px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:0;color:#D7E3EF;padding:10px 12px;border-radius:8px;font-size:.92rem;font-weight:500;border-left:3px solid transparent;transition:background .15s}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.active{background:rgba(255,255,255,.12);border-left-color:var(--accent);color:#fff;font-weight:600}
.rail-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.14);font-size:.76rem;color:#9FB8D2}

.main{overflow-x:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:24px 36px 20px}
.topbar h2{font-family:var(--font-display);font-weight:800;font-size:2rem;text-transform:uppercase;letter-spacing:.015em;color:var(--navy);line-height:1.05}
.topbar p{color:var(--muted);max-width:70ch;margin-top:6px;font-size:.96rem}
.crumb{font-size:.82rem;color:var(--muted);margin-bottom:8px}
.crumb a{color:var(--muted)}
.section{padding:26px 36px 64px;max-width:1120px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px}
.card h3{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;color:var(--navy);font-size:1.25rem;margin-bottom:8px}
.card h4{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;color:var(--navy);font-size:1rem;margin-bottom:6px}
.grid{display:grid;gap:16px}
.grid.cols-2{grid-template-columns:1fr 1fr}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1000px){.grid.cols-2,.grid.cols-3{grid-template-columns:1fr}}
.prose p{margin-bottom:12px}
.prose ul{padding-left:22px;margin-bottom:12px}
.prose li{margin-bottom:6px}

.btn{border:0;border-radius:8px;padding:10px 18px;font-weight:600;font-size:.92rem;transition:transform .08s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--navy);color:#fff}
.btn-merit{background:var(--gold);color:#fff}
.btn-merit:hover{background:#A66400}
.btn-primary:hover{background:var(--navy-2)}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn-ghost:hover{background:#EAF0F6}

.band{display:inline-block;font-family:var(--font-display);font-weight:700;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:99px;color:#fff}
.band.pass{background:var(--pass)} .band.merit{background:var(--merit)} .band.dist{background:var(--dist)}
.pill{display:inline-block;background:#EAF0F6;color:var(--navy);border-radius:99px;padding:3px 12px;font-size:.78rem;font-weight:600;margin:2px 4px 2px 0}
.pill.gold{background:#FBF1E0;color:var(--merit)}

.quick{display:flex;flex-direction:column;gap:10px}
.quick button{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;font-size:.95rem;font-weight:600;color:var(--navy);text-align:left}
.quick button:hover{border-color:var(--navy);background:#FBFCFE}
.quick .arrow{color:var(--accent);font-weight:800}

.hero-card{background:var(--navy);color:#EAF1F8;border-radius:var(--radius);padding:26px;position:relative;overflow:hidden}
.hero-card::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,194,75,.12)}
.hero-card h3{font-family:var(--font-display);font-weight:800;font-size:1.5rem;text-transform:uppercase;line-height:1.1;color:#fff}
.hero-card p{margin-top:8px;color:#C7D7E7;font-size:.95rem;max-width:52ch}

.ladder{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-top:16px}
@media(max-width:920px){.ladder{grid-template-columns:1fr}}
.ladder>div{background:var(--card);padding:18px 20px;border-right:1px solid var(--line)}
.ladder>div:last-child{border-right:0}
.ladder h4{font-family:var(--font-display);text-transform:uppercase;font-size:1.05rem;margin-bottom:6px}
.ladder .pass-t{color:var(--pass)} .ladder .merit-t{color:var(--merit)} .ladder .dist-t{color:var(--dist)}
.ladder p{font-size:.88rem;color:var(--muted)}

/* unit grid */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.unit-tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;text-align:left;transition:border-color .15s, transform .08s;cursor:pointer;display:flex;flex-direction:column;gap:8px}
.unit-tile:hover{border-color:var(--navy);transform:translateY(-2px)}
.unit-tile .un{font-family:var(--font-display);font-weight:800;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.unit-tile .ut{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:var(--navy);line-height:1.1}
.unit-tile .ub{font-size:.86rem;color:var(--muted);flex:1}
.unit-tile .um{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:.72rem;font-weight:600;padding:2px 9px;border-radius:99px;background:#EAF0F6;color:var(--navy)}
.tag.y1{background:#FBF1E0;color:var(--merit)} .tag.y2{background:#EAF0F6;color:var(--pass)}

/* aims list */
.aim{display:grid;grid-template-columns:34px 1fr;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.aim:last-child{border-bottom:0}
.aim .a{font-family:var(--font-display);font-weight:800;font-size:1.2rem;color:var(--navy);background:#EAF0F6;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
.aim .t{font-size:.95rem;align-self:center}

/* resource links */
.reslist{display:flex;flex-direction:column;gap:10px}
.res{display:block;border:1px solid var(--line);border-radius:10px;padding:12px 14px;text-decoration:none;color:inherit}
.res:hover{border-color:var(--navy);background:#FBFCFE}
.res .rn{font-weight:700;color:var(--navy);text-decoration:underline}
.res .rd{font-size:.86rem;color:var(--muted);margin-top:2px}

/* forms / calculators */
label.fld{display:block;font-size:.8rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
select,input[type=number]{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:.95rem;background:#fff;color:var(--ink)}
input[type=text],input[type=date]{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:.9rem;background:#fff;color:var(--ink)}
select:focus,input:focus{border-color:var(--navy);outline:none}

/* print area + planner PDF */
#printArea{display:none}
@media print{
  body.printing .app{display:none!important}
  body.printing #printArea{display:block!important}
  @page{size:A4 landscape;margin:14mm}
}
.print-doc{font-family:var(--font-body);color:#1B2733;padding:0}
.print-doc h1{font-family:var(--font-display);font-size:24pt;color:#0F2A4A;text-transform:uppercase;letter-spacing:.01em;margin-bottom:4px}
.print-doc .print-meta{font-size:11pt;color:#5A6B7C;margin-bottom:16px}
.print-table{width:100%;border-collapse:collapse;font-size:11pt}
.print-table th{background:#0F2A4A;color:#fff;text-align:left;padding:7px 9px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;font-size:10pt}
.print-table td{border:1px solid #D8E0E8;padding:7px 9px;vertical-align:top}
.print-table tr:nth-child(even) td{background:#F4F7FA}
.print-doc .print-tip{margin-top:16px;font-size:10pt;color:#5A6B7C}
.mode-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.mode-tab{background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:8px 18px;font-weight:600;font-size:.9rem;color:var(--muted)}
.mode-tab.active{border-color:var(--navy);color:var(--navy);background:#EAF0F6}
.pts-table{width:100%;border-collapse:collapse;font-size:.9rem;margin-top:10px}
.pts-table th,.pts-table td{border:1px solid var(--line);padding:8px 12px;text-align:center}
.pts-table th{background:#EAF0F6;color:var(--navy);font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;font-size:.78rem}
.unit-row{display:grid;gap:10px;align-items:center;margin-bottom:10px}
.totals{display:flex;gap:18px;margin-top:6px;flex-wrap:wrap}
.total-box{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 22px;text-align:center;min-width:150px}
.total-box .n{font-family:var(--font-display);font-weight:800;font-size:1.9rem;color:var(--navy)}
.total-box.uplift .n{color:var(--dist)}
.total-box .l{font-size:.72rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.del-btn{background:transparent;border:0;color:var(--accent);font-weight:700;font-size:1.1rem;padding:4px 8px}
.progressbar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:8px 0}
.progressbar>div{height:100%;background:var(--navy);border-radius:99px;transition:width .3s}
.feedback{border-radius:10px;padding:13px 15px;font-size:.92rem;margin-top:10px}
.feedback.ok{background:#E7F4ED;border:1px solid #BCE0CC;color:#14532D}
.feedback.no{background:#FBEAEA;border:1px solid #F0C4C4;color:#7A1F1F}
.notice{background:#FFF7E8;border:1px solid #F0DCB0;border-radius:8px;padding:12px 14px;font-size:.88rem;color:#6B4E12;margin-top:12px}

/* save & resume highlighting */
.save-callout{background:#FFF7E8;border:1px solid #F0DCB0;border-left:5px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:.93rem;color:#6B4E12}
.save-callout strong{color:#5A3E00}
.save-card{border:2px solid var(--gold);background:#FFFCF5}
.save-card h3{color:var(--gold)}
.save-codebox{background:#FFF7E8;border:1px dashed var(--gold);border-radius:10px;padding:14px}
.save-restorebox{background:#F4F7FA;border:1px solid var(--line);border-radius:10px;padding:14px}

/* checklist */
.check{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line);font-size:.92rem}
.check:last-child{border-bottom:0}
.check input{width:18px;height:18px;margin-top:2px;flex-shrink:0;accent-color:var(--navy)}
.check label{cursor:pointer}
.check input:checked + label{color:var(--muted);text-decoration:line-through}

/* careers / role cards */
.role{border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:var(--card)}
.role .rt{font-family:var(--font-display);font-weight:700;color:var(--navy);font-size:1.05rem}
.role .rs{font-size:.82rem;color:var(--gold);font-weight:600;margin:2px 0 6px}
.role p{font-size:.88rem;color:var(--muted)}

.timeline{border-left:3px solid var(--line);padding-left:20px;margin-left:6px}
.tl{position:relative;padding:0 0 18px}
.tl::before{content:"";position:absolute;left:-26px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--navy)}
.tl h4{font-family:var(--font-display);text-transform:uppercase;color:var(--navy);font-size:1rem}
.tl p{font-size:.9rem;color:var(--muted);margin-top:3px}

@media(max-width:840px){
  .app{grid-template-columns:1fr}
  .rail{position:sticky;top:0;z-index:10}
  .nav{display:flex;overflow-x:auto;padding:8px}
  .nav-group,.rail-foot{display:none}
  .nav-item{white-space:nowrap;border-left:0;border-bottom:3px solid transparent}
  .nav-item.active{border-bottom-color:var(--accent)}
  .topbar,.section{padding-left:18px;padding-right:18px}
}

</style>
</head>
<body>
<div class="app">
  <nav class="rail" aria-label="Main navigation">
    <div class="rail-brand">
      <div class="kicker">BTEC L3 Esports · Exeter College</div>
      <h1>Progress <span class="lab">Hub</span></h1>
    </div>
    <div class="nav" id="nav"></div>
    <div class="rail-foot">Faculty of IT, Digital &amp; Data<br>BTEC L3 Nationals in Esports</div>
  </nav>
  <main class="main">
    <div class="topbar">
      <div class="crumb" id="crumb" hidden></div>
      <h2 id="pageTitle">Welcome</h2>
      <p id="pageSub"></p>
    </div>
    <div class="section" id="content"></div>
  </main>
</div>
<div id="printArea" aria-hidden="true"></div>
<script>
/* Esports Progress Hub — course & qualification data.
   Sourced from the Pearson BTEC Level 3 Nationals in Esports specification (Issue 3, May 2021). */

// Spec-sourced unit data — Pearson BTEC L3 Nationals in Esports (Issue 3, May 2021)
const UNITS = [
  {n:1,glh:60,year:1,title:"Introduction to Esports",
   brief:"Develop an understanding of the esports and traditional sports industries and the careers you could pursue.",
   aims:[["A","Understand the organisation of esports and traditional sports industries in the UK and globally"],["B","Examine genres of esports games titles played by professional and grassroots teams and tournaments"],["C","Explore career pathways and associated routes in esports"]],
   assessment:"Internally assessed assignments.",
   guidance:"This is your foundation unit. Assessors want breadth and accuracy: name real organisations, real tournaments and real career routes rather than talking in general terms. For the higher bands, connect the structure of the industry to the opportunities it creates, and judge which pathways realistically fit different skills and ambitions.",
   resources:[["British Esports Federation","https://britishesports.org","The UK's national body — structure, education and grassroots routes."],["Esports Insider","https://esportsinsider.com","Industry news and organisation profiles for real-world examples."],["Pearson unit spec","https://qualifications.pearson.com","The official learning aims and assessment criteria."]],
   careers:["Esports industry analyst","Event coordinator","Community manager","Pathways into business, media and tech roles"]},

  {n:2,glh:120,year:1,title:"Esports Skills, Strategies and Analysis",
   brief:"Develop the understanding and skills to analyse esports performances and recommend improvements.",
   aims:[["A","Understand strategies and training requirements associated with in-game skills"],["B","Explore best practices, skills, techniques and tactics of high-performing teams"],["C","Explore different methods of analysis for selected genres of games"],["D","Carry out performance analysis in a game to recommend improvements for an individual or team"]],
   assessment:"Internally assessed — the largest unit at 120 GLH, drawing on learning from across the programme.",
   guidance:"This is the heaviest unit and carries the most points, so it rewards sustained effort. The top bands hinge on aim D: your analysis must be evidence-led (data, VOD timestamps, measurable observations) and your recommendations must follow logically from what you found. Avoid opinion dressed up as analysis.",
   resources:[["Mobalytics / op.gg style trackers","https://mobalytics.gg","Performance data examples for analysis methods."],["Pearson unit spec","https://qualifications.pearson.com","Assessment criteria for each learning aim."]],
   careers:["Performance analyst","Coach","Professional player","Strategy / data analyst (transferable)"]},

  {n:3,glh:90,year:1,title:"Enterprise and Entrepreneurship in the Esports Industry",
   brief:"Study successful esports enterprises and entrepreneurs; research, plan and pitch your own start-up.",
   aims:[["A","Explore enterprise and entrepreneurship in the esports industry"],["B","Conduct market research for a start-up enterprise idea"],["C","Create a business plan for a start-up enterprise idea"],["D","Pitch and review a start-up enterprise idea"]],
   assessment:"Internally assessed assignments culminating in a planned and pitched enterprise idea.",
   guidance:"Distinction work here is realistic, not fantastical. Ground your plan in genuine market research (aim B), make the financials add up, and in your review (aim D) appraise the plan honestly — where it's weak, what you'd change, and whether it would actually survive a second year.",
   resources:[["Prince's Trust enterprise resources","https://www.princes-trust.org.uk","Business planning templates and start-up guidance."],["Pearson unit spec","https://qualifications.pearson.com","Learning aims and criteria."]],
   careers:["Founder / entrepreneur","Esports business development","Sponsorship & partnerships","Self-employment routes"]},

  {n:4,glh:90,year:1,title:"Health, Wellbeing and Fitness for Esports Players",
   brief:"Explore the importance of health, wellbeing and fitness; assess and suggest ways to improve.",
   aims:[["A","Examine the importance of physical, social and psychological wellbeing for esports players"],["B","Explore how physical, social and psychological wellbeing affect performance"],["C","Investigate methods of health and wellbeing assessment"],["D","Undertake health and wellbeing screening and provide feedback to improve health status"]],
   assessment:"Internally assessed — includes applying assessment methods to a real performer and yourself.",
   guidance:"Use recognised benchmarks and national guidance as your evidence base rather than assumptions. The higher bands need you to connect specific wellbeing factors to specific performance effects (aim B) and to justify the improvement strategies you recommend against that evidence.",
   resources:[["NHS Live Well","https://www.nhs.uk/live-well","Recognised UK guidance on sleep, activity and wellbeing."],["Pearson unit spec","https://qualifications.pearson.com","Assessment criteria."]],
   careers:["Performance / wellbeing coach","Sport & exercise pathways","Player welfare roles","Health-sector progression"]},

  {n:5,glh:120,year:2,title:"Esports Events",
   brief:"Work as part of a small group to plan, coordinate and manage an esports event and evaluate the skills gained.",
   aims:[["A","Explore the role of an esports event organiser"],["B","Investigate the feasibility of a proposed esports event"],["C","Develop a detailed plan for an esports event to meet set objectives"],["D","Stage, manage and review an esports event to meet set objectives"]],
   assessment:"Internally assessed group unit — 120 GLH, with real delivery and review of an event.",
   guidance:"This unit is assessed on planning rigour and honest review as much as the event itself. Use real planning tools (Gantt charts, risk registers, run orders). For the top bands, your post-event evaluation (aim D) must compare plan against reality and draw conclusions a professional event producer would recognise.",
   resources:[["British Esports — events","https://britishesports.org","Examples of grassroots and student events."],["Pearson unit spec","https://qualifications.pearson.com","Learning aims and criteria."]],
   careers:["Event manager / producer","Operations coordinator","Tournament organiser","Project management (transferable)"]},

  {n:6,glh:60,year:2,title:"Live-streamed Broadcasting",
   brief:"Explore and develop skills for the production, content development and broadcast of live-streamed esports.",
   aims:[["A","Explore live-streamed esports/games characteristics and technologies"],["B","Prepare for a live-streamed esports/games broadcast"],["C","Broadcast live-streaming esports/games using industry standards"]],
   assessment:"Internally assessed — culminates in producing a live-streamed broadcast to industry standards.",
   guidance:"Aim C is practical: your broadcast must meet industry standards, so know your OBS scene structure, bitrate and overlay readability cold. For higher bands, analyse the form, codes and conventions of professional streams (aim A) and apply those deliberately to your own — don't just stream, justify your production choices.",
   resources:[["OBS Studio","https://obsproject.com","The industry-standard free broadcasting software."],["Twitch Creator Camp","https://www.twitch.tv/creatorcamp","Official guidance on stream production and standards."],["Pearson unit spec","https://qualifications.pearson.com","Assessment criteria."]],
   careers:["Stream producer","Broadcast technician","Online content manager","Visual / media engineering"]},

  {n:7,glh:60,year:2,title:"Producing an Esports Brand",
   brief:"Investigate branding in esports; plan and create branding and promotional content for a team.",
   aims:[["A","Investigate the role of branding in esports teams"],["B","Plan brand activation content for a specific esports team"],["C","Create brand activation content for a specific esports team"]],
   assessment:"Internally assessed — produce real branding and promotional content for a chosen or created team.",
   guidance:"Branding is judged on coherence and rationale. The higher bands want you to plan activation content against genuine market needs (aim B) and justify why your visual identity, tone and channels suit that audience — not simply that it 'looks good'.",
   resources:[["Behance — branding","https://www.behance.net","Real brand identity work for inspiration and conventions."],["Canva / Adobe Express","https://www.canva.com","Tools for producing brand assets."],["Pearson unit spec","https://qualifications.pearson.com","Learning aims and criteria."]],
   careers:["Brand / marketing designer","Social media manager","Merchandise & partnerships","Graphic design progression"]},

  {n:8,glh:60,year:2,title:"Video Production",
   brief:"Develop knowledge, understanding and practical skills in video production for esports.",
   aims:[["A","Explore video products in esports/games"],["B","Undertake video pre-production for an esports/game brief"],["C","Produce an esports/game video for a brief"]],
   assessment:"Internally assessed — full pre-production, production and post-production for a brief.",
   guidance:"Pre-production evidence (aim B) is where students lose marks: assessors want shot lists, storyboards, schedules and sourced assets, not just the finished video. For the top bands, analyse codes and conventions of professional esports video (aim A) and show them reflected in deliberate choices in your edit.",
   resources:[["DaVinci Resolve","https://www.blackmagicdesign.com/products/davinciresolve","Free professional-grade editing software."],["No Film School","https://nofilmschool.com","Production technique and pre-production planning."],["Pearson unit spec","https://qualifications.pearson.com","Assessment criteria."]],
   careers:["Video editor / producer","Content creator","Motion graphics","Journalism & media progression"]},

  {n:10,glh:60,year:2,title:"Business Applications of Esports in Social Media",
   brief:"Explore how esports organisations use social media commercially, then plan and implement activity.",

<script>
/* Esports Progress Hub — offline Office/PDF file generation (no external libraries).
   Produces valid .xlsx and .docx via a minimal in-browser ZIP writer. */

/* ===================== FILE GENERATION (offline, no libraries) ===================== */
const CRC_TABLE=(()=>{let c,t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=CRC_TABLE[(c^b[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function strU8(s){return new TextEncoder().encode(s);}
function makeZip(files){
  const u16=n=>[n&0xFF,(n>>8)&0xFF], u32=n=>[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];
  const chunks=[], central=[]; let offset=0;
  files.forEach(f=>{
    const name=strU8(f.name), data=f.data, crc=crc32(data), size=data.length;
    const local=new Uint8Array([].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(crc),u32(size),u32(size),u16(name.length),u16(0)));
    chunks.push(local,name,data);
    const cen=new Uint8Array([].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(crc),u32(size),u32(size),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)));
    central.push({h:cen,n:name});
    offset+=local.length+name.length+data.length;
  });
  const cStart=offset; let cSize=0;
  central.forEach(c=>{chunks.push(c.h,c.n);cSize+=c.h.length+c.n.length;});
  chunks.push(new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(central.length),u16(central.length),u32(cSize),u32(cStart),u16(0))));
  let total=chunks.reduce((s,c)=>s+c.length,0), out=new Uint8Array(total), p=0;
  chunks.forEach(c=>{out.set(c,p);p+=c.length;});
  return out;
}
function xmlEsc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]));}
function downloadBytes(bytes,filename,mime){
  const blob=new Blob([bytes],{type:mime}), url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},150);
}

/* ----- XLSX ----- */
function colRef(i){let s='';i++;while(i>0){let m=(i-1)%26;s=String.fromCharCode(65+m)+s;i=Math.floor((i-1)/26);}return s;}
function buildXlsx(title,headers,rows,opts){
  opts=opts||{};
  if(Array.isArray(opts)) opts={widths:opts}; // backward compat
  const widths=opts.widths;
  const statusCol=(opts.statusCol!=null)?opts.statusCol:-1;
  const statusColours=opts.statusColours||{};
  // build a stable list of status fill colours -> xf index (start at 2)
  const statusKeys=Object.keys(statusColours);
  const statusXf={}; statusKeys.forEach((k,i)=>statusXf[k]=2+i);
  const allRows=[headers,...rows];
  let sheet='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">';
  if(widths){sheet+='<cols>'+widths.map((w,i)=>'<col min="'+(i+1)+'" max="'+(i+1)+'" width="'+w+'" customWidth="1"/>').join('')+'</cols>';}
  sheet+='<sheetData>';
  allRows.forEach((r,ri)=>{
    sheet+='<row r="'+(ri+1)+'">';
    r.forEach((cell,ci)=>{
      let s=ri===0?1:0;
      if(ri>0 && ci===statusCol && statusXf[cell]!=null) s=statusXf[cell];
      sheet+='<c r="'+colRef(ci)+(ri+1)+'" t="inlineStr" s="'+s+'"><is><t xml:space="preserve">'+xmlEsc(cell)+'</t></is></c>';
    });
    sheet+='</row>';
  });
  sheet+='</sheetData></worksheet>';
  const baseFills=3; // none, gray125, header navy
  const fillsXml=statusKeys.map(k=>'<fill><patternFill patternType="solid"><fgColor rgb="'+statusColours[k]+'"/></patternFill></fill>').join('');
  const xfsXml=statusKeys.map(k=>'<xf numFmtId="0" fontId="0" fillId="'+(baseFills+statusKeys.indexOf(k))+'" borderId="0" xfId="0" applyAlignment="1" applyFill="1"><alignment vertical="top" wrapText="1"/></xf>').join('');
  const styles='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'+
    '<fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font></fonts>'+
    '<fills count="'+(baseFills+statusKeys.length)+'"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill><fill><patternFill patternType="solid"><fgColor rgb="FF0F2A4A"/></patternFill></fill>'+fillsXml+'</fills>'+
    '<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>'+
    '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'+
    '<cellXfs count="'+(2+statusKeys.length)+'"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0" applyAlignment="1"><alignment vertical="top" wrapText="1"/></xf>'+
    '<xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyAlignment="1"><alignment vertical="center" wrapText="1"/></xf>'+xfsXml+'</cellXfs>'+
    '<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles></styleSheet>';
  const files=[
    {name:'[Content_Types].xml',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>')},
    {name:'_rels/.rels',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')},
    {name:'xl/workbook.xml',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="'+xmlEsc(title.slice(0,28))+'" sheetId="1" r:id="rId1"/></sheets></workbook>')},
    {name:'xl/_rels/workbook.xml.rels',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>')},
    {name:'xl/styles.xml',data:strU8(styles)},
    {name:'xl/worksheets/sheet1.xml',data:strU8(sheet)}
  ];
  return makeZip(files);
}

/* ----- DOCX (A4 landscape, title + table) ----- */
function buildDocx(title,meta,headers,rows,opts){
  opts=opts||{};
  const statusCol=(opts.statusCol!=null)?opts.statusCol:-1;
  const statusColours=opts.statusColours||{};
  function runs(text,o){o=o||{};return '<w:r><w:rPr>'+(o.b?'<w:b/>':'')+(o.color?'<w:color w:val="'+o.color+'"/>':'')+'<w:sz w:val="'+(o.sz||22)+'"/><w:rFonts w:ascii="Calibri" w:hAscii="Calibri"/></w:rPr><w:t xml:space="preserve">'+xmlEsc(text)+'</w:t></w:r>';}
  function para(text,o){o=o||{};return '<w:p><w:pPr>'+(o.heading?'<w:spacing w:after="120"/>':'')+'</w:pPr>'+runs(text,o)+'</w:p>';}
  function cell(text,o){o=o||{};return '<w:tc><w:tcPr><w:tcW w:w="'+(o.w||1500)+'" w:type="dxa"/>'+(o.shd?'<w:shd w:val="clear" w:fill="'+o.shd+'"/>':'')+'<w:tcMar><w:top w:w="60" w:type="dxa"/><w:bottom w:w="60" w:type="dxa"/><w:left w:w="80" w:type="dxa"/><w:right w:w="80" w:type="dxa"/></w:tcMar></w:tcPr>'+para(text,o)+'</w:tc>';}
  const widths=[1400,2600,1500,1600,1300,1500,3000];
  let tbl='<w:tbl><w:tblPr><w:tblStyle w:val="TableGrid"/><w:tblW w:w="0" w:type="auto"/><w:tblBorders><w:top w:val="single" w:sz="4" w:color="D8E0E8"/><w:left w:val="single" w:sz="4" w:color="D8E0E8"/><w:bottom w:val="single" w:sz="4" w:color="D8E0E8"/><w:right w:val="single" w:sz="4" w:color="D8E0E8"/><w:insideH w:val="single" w:sz="4" w:color="D8E0E8"/><w:insideV w:val="single" w:sz="4" w:color="D8E0E8"/></w:tblBorders></w:tblPr>';
  tbl+='<w:tr>'+headers.map((h,i)=>cell(h,{b:true,color:'FFFFFF',shd:'0F2A4A',w:widths[i],sz:20})).join('')+'</w:tr>';
  rows.forEach(r=>{tbl+='<w:tr>'+r.map((cv,i)=>{
    const o={w:widths[i],sz:20};
    if(i===statusCol && statusColours[cv]){o.shd=statusColours[cv];o.b=true;}
    return cell(cv,o);
  }).join('')+'</w:tr>';});
  tbl+='</w:tbl>';
  const body='<w:p><w:pPr><w:spacing w:after="40"/></w:pPr>'+runs(title,{b:true,sz:36,color:'0F2A4A'})+'</w:p>'+
    '<w:p><w:pPr><w:spacing w:after="160"/></w:pPr>'+runs(meta,{sz:20,color:'5A6B7C'})+'</w:p>'+tbl+
    '<w:p><w:pPr><w:spacing w:before="200"/></w:pPr>'+runs('Tip: work backwards from each deadline — set your draft-complete date a few days earlier, and always meet the first deadline to keep a resubmission possible.',{sz:18,color:'5A6B7C'})+'</w:p>'+
    '<w:sectPr><w:pgSz w:w="16838" w:h="11906" w:orient="landscape"/><w:pgMar w:top="720" w:right="720" w:bottom="720" w:left="720"/></w:sectPr>';
  const doc='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>'+body+'</w:body></w:document>';
  const files=[
    {name:'[Content_Types].xml',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>')},
    {name:'_rels/.rels',data:strU8('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>')},
    {name:'word/document.xml',data:strU8(doc)}
  ];
  return makeZip(files);
}

gcState.opts=[8,11,10,6,7,12].map(n=>({unit:n,grade:'M'}));
while(gcState.opts.length<10) gcState.opts.push({unit:OPTIONAL_UNITS.find(o=>!gcState.opts.some(x=>x.unit===o.n))?.n||8, grade:'M'});

function computeQual(year){
  const Q=QUALS[year];
  const opts=gcState.opts.slice(0,Q.optCount);
  const all=[...Q.mandatory.map(u=>({glh:u.glh,grade:gcState.mand[u.n]})),...opts.map(o=>({glh:'60',grade:o.grade}))];
  const total=all.reduce((s,u)=>s+UNIT_PTS[u.glh][u.grade],0);
  const failedMand=Q.mandatory.filter(u=>gcState.mand[u.n]==='U');
  const glhAtPass=all.reduce((s,u)=>s+(u.grade!=='U'?Number(u.glh):0),0);
  const need900=(year==='y2'&&glhAtPass<900);
  const eligible=failedMand.length===0&&!need900;
  let grade='U';
  if(eligible){ for(const [g,thr] of Q.thresholds){ if(total>=thr) grade=g; } }
  return {Q,all,total,failedMand,glhAtPass,need900,eligible,grade};
}
function gradeColour(g){return g==='U'?'var(--accent)':(g.includes('D')?'var(--dist)':(g.includes('M')?'var(--merit)':'var(--navy)'));}
function unitTitle(n){const u=UNITS.find(x=>x.n===n);return u?u.title:'Unit '+n;}
function gradeSelectEl(val,onchange){
  const s=el('<select style="max-width:150px"></select>');
  [['U','Unclassified'],['P','Pass'],['M','Merit'],['D','Distinction']].forEach(([v,l])=>{
    const o=el('<option value="'+v+'">'+l+'</option>');if(v===val)o.selected=true;s.appendChild(o);
  });
  s.onchange=()=>onchange(s.value);
  return s;
}

function renderCalc(){
  const Q=QUALS[gcYear], isY2=gcYear==='y2';
  const mandToShow=isY2?Q.mandatory.filter(u=>u.n>4):Q.mandatory;
  const optStart=isY2?3:0;
  const visibleOpts=gcState.opts.slice(optStart,Q.optCount);
  const mWrap=$('gcMandatory'); mWrap.innerHTML='';

  if(isY2){
    const y1=computeQual('y1');
    const y1U=y1.all.filter(u=>u.grade==='U').length;
    const chips=[...QUALS.y1.mandatory.map(u=>'<span class="pill">U'+u.n+': '+gcState.mand[u.n]+' · '+UNIT_PTS[u.glh][gcState.mand[u.n]]+'pts</span>'),
      ...gcState.opts.slice(0,3).map(o=>'<span class="pill">U'+o.unit+': '+o.grade+' · '+UNIT_PTS['60'][o.grade]+'pts</span>')].join('');
    const banked=el(`<div style="background:#F8FAFC;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Carried forward from Year 1</div>
      <div style="margin-bottom:8px">${chips}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="font-size:.92rem"><b style="font-family:var(--font-display);font-size:1.2rem;color:var(--navy)">${y1.total} points</b> banked from 7 Year 1 units${y1U?' <span style="color:var(--accent);font-weight:600">('+y1U+' at U)</span>':''}</div>
        <button class="btn btn-ghost" id="gcEditY1" style="padding:6px 14px;font-size:.85rem">Edit Year 1</button></div></div>`);
    mWrap.appendChild(banked);
    banked.querySelector('#gcEditY1').onclick=()=>{gcYear='y1';route('gradecalc');};
  }

  mandToShow.forEach(u=>{
    const row=el('<div class="unit-row" style="grid-template-columns:1fr auto auto"></div>');
    row.appendChild(el(`<div style="font-size:.9rem"><b>Unit ${u.n}:</b> ${esc(unitTitle(u.n))} <span class="pill">${u.glh} GLH</span></div>`));
    row.appendChild(gradeSelectEl(gcState.mand[u.n],v=>{gcState.mand[u.n]=v;renderCalc();}));
    row.appendChild(el(`<div style="font-family:var(--font-display);font-weight:700;color:var(--navy);min-width:54px;text-align:right">${UNIT_PTS[u.glh][gcState.mand[u.n]]} pts</div>`));
    mWrap.appendChild(row);
  });

  const oWrap=$('gcOptional'); oWrap.innerHTML='';
  visibleOpts.forEach(o=>{
    const row=el('<div class="unit-row" style="grid-template-columns:1fr auto auto"></div>');
    const sel=el('<select></select>');
    OPTIONAL_UNITS.forEach(u=>{const op=el('<option value="'+u.n+'">Unit '+u.n+': '+esc(u.t)+'</option>');if(u.n===o.unit)op.selected=true;sel.appendChild(op);});
    sel.onchange=()=>{o.unit=Number(sel.value);renderCalc();};
    row.appendChild(sel);
    row.appendChild(gradeSelectEl(o.grade,v=>{o.grade=v;renderCalc();}));
    row.appendChild(el(`<div style="font-family:var(--font-display);font-weight:700;color:var(--navy);min-width:54px;text-align:right">${UNIT_PTS['60'][o.grade]} pts</div>`));
    oWrap.appendChild(row);
  });
  $('gcGlhLine').textContent=isY2
    ?'Year 2 adds Unit 5 plus seven more units. Your Extended Diploma grade is calculated across all 15 units from both years.'
    :'The Foundation Diploma totals 540 GLH across 7 units.';

  const res=computeQual(gcYear);
  const totalIfD=res.all.reduce((s,u)=>s+UNIT_PTS[u.glh][u.grade==='M'?'D':u.grade],0);
  $('gcQualName').textContent=Q.name+' · '+Q.glh+' GLH · size of '+(isY2?'three A Levels':'1.5 A Levels');
  const gEl=$('gcGrade'); gEl.textContent=res.grade; gEl.style.color=gradeColour(res.grade);
  $('gcPoints').textContent=res.total;
  $('gcSplit').textContent=isY2?(computeQual('y1').total+' points from Year 1 + '+(res.total-computeQual('y1').total)+' points from Year 2'):'';

  const elig=$('gcEligibility');
  if(res.failedMand.length){
    elig.innerHTML='<div class="feedback no"><b>Unclassified regardless of points:</b> Pearson requires at least a Pass in each of Units '+Q.mandatory[0].n+'–'+Q.mandatory[Q.mandatory.length-1].n+'. Currently at U: '+res.failedMand.map(u=>'Unit '+u.n).join(', ')+'.</div>';
  } else if(res.need900){
    elig.innerHTML='<div class="feedback no"><b>Unclassified regardless of points:</b> the Extended Diploma needs at least 900 GLH at Pass or above. You have '+res.glhAtPass+' GLH at Pass+.</div>';
  } else elig.innerHTML='';

  const nextEl=$('gcNext');
  if(!res.eligible){ nextEl.innerHTML='<div style="font-size:.9rem;color:var(--muted)">Fix the eligibility issue above — points only count once it is resolved.</div>'; }
  else {
    const idx=Q.thresholds.findIndex(([g])=>g===res.grade);
    if(idx<Q.thresholds.length-1){
      const [nextG,nextThr]=Q.thresholds[idx+1];
      const need=nextThr-res.total, curThr=Q.thresholds[idx][1];
      const pct=Math.min(100,Math.round((res.total-curThr)/(nextThr-curThr)*100));
      nextEl.innerHTML='<div style="font-size:.8rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Next grade up: <b style="color:var(--navy)">'+esc(nextG)+'</b> at '+nextThr+' points</div><div class="progressbar"><div style="width:'+pct+'%"></div></div><div style="font-size:.9rem">You need <b>'+need+' more point'+(need===1?'':'s')+'</b>. A 60 GLH unit Merit→Distinction is worth +6; a 120 GLH unit +12.</div>';
    } else nextEl.innerHTML='<div style="font-size:.9rem;color:var(--good);font-weight:600">You are at the top of the scale — the maximum possible result.</div>';
  }

  const meanEl=$('gcMeaning');
  let ucasLine='';
  if(res.eligible&&res.grade!=='U'&&Q.ucas[res.grade]!==undefined){
    ucasLine='<span class="pill gold">'+Q.ucas[res.grade]+' UCAS points</span>'+(Q.aLevel&&Q.aLevel[res.grade]?'<span class="pill">Same as '+Q.aLevel[res.grade]+' at A Level</span>':'');
  }
  meanEl.innerHTML='<div style="font-size:.8rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">What this grade means</div>'+(ucasLine?'<div style="margin-bottom:8px">'+ucasLine+'</div>':'')+'<div style="font-size:.92rem">'+esc(Q.meaning[res.grade]||'')+'</div>';

  $('gcTotalNow').textContent=res.total;
  $('gcTotalIf').textContent=totalIfD;
  let upG='U'; if(res.eligible){for(const[g,thr]of Q.thresholds){if(totalIfD>=thr)upG=g;}}
  const merits=res.all.filter(u=>u.grade==='M').length;
  $('gcUpliftGrade').textContent=merits===0?'No Merits to convert right now.':(res.eligible&&upG!==res.grade?'Converting your '+merits+' Merit'+(merits===1?'':'s')+' to Distinctions lifts you from '+res.grade+' to '+upG+'. Same units, better evidence.':'Converting your '+merits+' Merit'+(merits===1?'':'s')+' adds '+(totalIfD-res.total)+' points — banked insurance.');
}

function ucasQualPoints(q){return q.type==='Other (enter points)'?(q.custom||0):(OTHER_QUALS[q.type][q.grade]||0);}
function renderUcas(){
  const r=computeQual(ucasSrcYear), Q=QUALS[ucasSrcYear];
  const pts=(r.eligible&&r.grade!=='U'&&Q.ucas[r.grade]!==undefined)?Q.ucas[r.grade]:0;
  const srcEl=$('ucasSource');
  if(r.grade==='U') srcEl.innerHTML='<div class="feedback no">Your '+Q.name+' currently calculates as Unclassified (0 UCAS points). Open the Grade Calculator to fix it.</div>';
  else srcEl.innerHTML='<div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap"><div style="font-family:var(--font-display);font-weight:800;font-size:2.4rem;line-height:1;color:var(--navy)">'+esc(r.grade)+'</div><span class="pill gold">'+pts+' UCAS points</span></div>';

  const oEl=$('ucasOthers'); oEl.innerHTML='';
  ucasOthers.forEach((q,idx)=>{
    const row=el('<div class="unit-row" style="grid-template-columns:1.2fr 1fr auto auto"></div>');
    const tSel=el('<select></select>');
    [...Object.keys(OTHER_QUALS),'Other (enter points)'].forEach(t=>{const o=el('<option value="'+esc(t)+'">'+esc(t)+'</option>');if(t===q.type)o.selected=true;tSel.appendChild(o);});
    tSel.onchange=()=>{q.type=tSel.value;q.grade=null;q.custom=0;renderUcas();};
    let second;
    if(q.type==='Other (enter points)'){
      second=el('<input type="number" min="0" max="200" value="'+(q.custom||0)+'">');
      second.onchange=()=>{q.custom=Math.max(0,Math.min(200,Number(second.value)||0));renderUcas();};
    } else {
      second=el('<select></select>');
      const grades=Object.keys(OTHER_QUALS[q.type]); if(!q.grade)q.grade=grades[grades.length-1];
      grades.forEach(g=>{const o=el('<option value="'+g+'">'+g+'</option>');if(g===q.grade)o.selected=true;second.appendChild(o);});
      second.onchange=()=>{q.grade=second.value;renderUcas();};
    }
    row.appendChild(tSel); row.appendChild(second);
    row.appendChild(el('<div style="font-family:var(--font-display);font-weight:700;color:var(--navy);min-width:54px;text-align:right">'+ucasQualPoints(q)+' pts</div>'));
    const del=el('<button class="del-btn" aria-label="Remove">✕</button>'); del.onclick=()=>{ucasOthers.splice(idx,1);renderUcas();};
    row.appendChild(del); oEl.appendChild(row);
  });

  const otherTotal=ucasOthers.reduce((s,q)=>s+ucasQualPoints(q),0);
  const total=pts+otherTotal;
  $('ucasTotal').textContent=total;
  $('ucasBreakdown').textContent=pts+' from your '+Q.name+(ucasOthers.length?(' + '+otherTotal+' from '+ucasOthers.length+' other qualification'+(ucasOthers.length===1?'':'s')):'')+'.';

  const target=Number($('ucasTarget').value), gapEl=$('ucasGap');
  if(total>=target) gapEl.innerHTML='<div class="feedback ok"><b>You clear this offer by '+(total-target)+' points.</b> Offers are conditional, so the grades still have to land.</div>';
  else {
    const gap=target-total; let route2='';
    if(ucasSrcYear==='y2'&&r.eligible){
      const idx=QUALS.y2.thresholds.findIndex(([g])=>g===r.grade);
      if(idx>-1&&idx<QUALS.y2.thresholds.length-1){for(let i=idx+1;i<QUALS.y2.thresholds.length;i++){const g=QUALS.y2.thresholds[i][0];if((QUALS.y2.ucas[g]||0)>=pts+gap){route2=' Climbing to '+g+' ('+QUALS.y2.ucas[g]+' UCAS points) would close it on its own.';break;}}}
    }
    gapEl.innerHTML='<div class="feedback no"><b>'+gap+' points short of this offer.</b>'+esc(route2)+'</div>';
  }
}

/* ---------- TARGET TRACKER ---------- */
/* Lets students set a target grade per unit and log actual grades, see on/above/below */
let trackState={}; // {unitN:{target,actual}}
UNITS.forEach(u=>trackState[u.n]={target:'M',actual:'—'});
const GRADE_ORDER={'—':-1,'U':0,'P':1,'M':2,'D':3};
PAGES.tracker = {
  title:"Target Tracker",
  sub:"Set a target grade for each unit at the start of the year, then log your actual grades as assignments come back. See at a glance whether you're on track.",
  render(c){
    c.appendChild(el(`<div class="notice" style="margin-top:0">This tracker is for your own planning and isn't saved between sessions — note your targets somewhere too. Your official grades live in the Universal Tracker on your eILP.</div>`));
    const card=el('<div class="card"><h3>My units</h3><div id="trRows"></div></div>');
    c.appendChild(card);
    c.appendChild(el(`<div class="card" style="margin-top:16px"><h3>How am I tracking?</h3><div id="trSummary"></div></div>`));
    renderTracker();
  }
};
function gradeSel2(val,onchange,withDash){
  const s=el('<select style="max-width:140px"></select>');
  const opts=withDash?[['—','Not yet graded'],['U','U'],['P','Pass'],['M','Merit'],['D','Distinction']]:[['U','U'],['P','Pass'],['M','Merit'],['D','Distinction']];
  opts.forEach(([v,l])=>{const o=el('<option value="'+v+'">'+esc(l)+'</option>');if(v===val)o.selected=true;s.appendChild(o);});
  s.onchange=()=>onchange(s.value);return s;
}
function renderTracker(){
  const rows=$('trRows'); rows.innerHTML='';
  const head=el('<div class="unit-row" style="grid-template-columns:1.6fr 1fr 1fr 1fr;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600"></div>');
  ['Unit','Target','Actual','Status'].forEach(h=>head.appendChild(el('<div>'+h+'</div>')));
  rows.appendChild(head);
  UNITS.forEach(u=>{
    const t=trackState[u.n];
    const row=el('<div class="unit-row" style="grid-template-columns:1.6fr 1fr 1fr 1fr;align-items:center"></div>');
    row.appendChild(el('<div style="font-size:.88rem"><b>U'+u.n+':</b> '+esc(u.title)+'</div>'));
    row.appendChild(gradeSel2(t.target,v=>{t.target=v;renderTracker();},false));
    row.appendChild(gradeSel2(t.actual,v=>{t.actual=v;renderTracker();},true));
    let status='',col='var(--muted)';
    if(t.actual==='—'){status='—';}
    else{const d=GRADE_ORDER[t.actual]-GRADE_ORDER[t.target];
      if(d>0){status='Above target';col='var(--good)';}
      else if(d===0){status='On target';col='var(--pass)';}
      else{status='Below target';col='var(--accent)';}}
    row.appendChild(el('<div style="font-weight:700;font-size:.86rem;color:'+col+'">'+status+'</div>'));
    rows.appendChild(row);
  });
  // summary
  const graded=UNITS.filter(u=>trackState[u.n].actual!=='—');
  const above=graded.filter(u=>GRADE_ORDER[trackState[u.n].actual]>GRADE_ORDER[trackState[u.n].target]).length;
  const on=graded.filter(u=>GRADE_ORDER[trackState[u.n].actual]===GRADE_ORDER[trackState[u.n].target]).length;
  const below=graded.filter(u=>GRADE_ORDER[trackState[u.n].actual]<GRADE_ORDER[trackState[u.n].target]).length;
  const s=$('trSummary');
  if(!graded.length){ s.innerHTML='<p style="font-size:.9rem;color:var(--muted)">Log some actual grades above to see how you are tracking against your targets.</p>'; return; }
  s.innerHTML='<div class="totals"><div class="total-box"><div class="n" style="color:var(--good)">'+above+'</div><div class="l">Above target</div></div><div class="total-box"><div class="n" style="color:var(--pass)">'+on+'</div><div class="l">On target</div></div><div class="total-box"><div class="n" style="color:var(--accent)">'+below+'</div><div class="l">Below target</div></div></div>'+
    (below>0?'<div class="feedback no" style="margin-top:14px">'+below+' unit'+(below===1?'':'s')+' below target. Remember: while you met the deadline, a resubmission may be possible — speak to your lecturer early.</div>':'<div class="feedback ok" style="margin-top:14px">You are meeting or beating every target you have logged. Keep the evidence quality high.</div>');
}

/* ---------- STUDY PLANNER ---------- */
let plannerState = {
  name:"", group:"", year:null,
  rows:[]
};
function seedPlanner(){
  // Each year's planner shows only that year's units.
  let unitNums;
  if(plannerState.year==='y2'){
    const y1opts = gcState.opts.slice(0,3).map(o=>o.unit);
    const y2opts = OPTIONAL_UNITS.map(o=>o.n).filter(n=>!y1opts.includes(n));
    unitNums = [5, ...y2opts];
  } else {
    const y1opts = gcState.opts.slice(0,3).map(o=>o.unit);
    unitNums = [1,2,3,4,...y1opts];
  }
  plannerState.rows = unitNums.map(n=>({unit:n, task:"", deadline:"", draftby:"", target:"M", status:"Not started", notes:""}));
}
const STATUSES=["Not started","In progress","Draft done","Submitted","Graded"];
const STATUS_META={
  "Not started":{bg:"#EEF1F4",text:"#5A6B7C",xlsx:"FFEEF1F4",docx:"EEF1F4"},
  "In progress":{bg:"#FBF1E0",text:"#8A5A00",xlsx:"FFFBF1E0",docx:"FBF1E0"},
  "Draft done":{bg:"#E3EEF8",text:"#1B4D7A",xlsx:"FFE3EEF8",docx:"E3EEF8"},
  "Submitted":{bg:"#E3F1EA",text:"#1E6B45",xlsx:"FFE3F1EA",docx:"E3F1EA"},
  "Graded":{bg:"#D9EAD3",text:"#27632A",xlsx:"FFD9EAD3",docx:"D9EAD3"}
};
const STATUS_COL_INDEX=5; // Unit,Task,Deadline,Draft,Target,Status,Notes

/* ----- Save / restore (offline: device auto-save + portable code) ----- */
const LS_KEY='esports_planner_v1';
function serialisePlanner(){
  return {v:1, n:plannerState.name, g:plannerState.group, y:plannerState.year,
    r:plannerState.rows.map(r=>[r.unit, r.task, r.deadline, r.draftby, ['P','M','D'].indexOf(r.target), STATUSES.indexOf(r.status), r.notes])};
}
function deserialisePlanner(o){
  if(!o||o.v!==1||!Array.isArray(o.r)) throw new Error('Not a valid planner code');
  plannerState.name=o.n||''; plannerState.group=o.g||''; plannerState.year=(o.y==='y2')?'y2':'y1';
  plannerState.rows=o.r.map(a=>({unit:Number(a[0])||1, task:a[1]||'', deadline:a[2]||'', draftby:a[3]||'', target:(['P','M','D'][a[4]]||'M'), status:(STATUSES[a[5]]||'Not started'), notes:a[6]||''}));
}
function encodeState(obj){
  const bytes=new TextEncoder().encode(JSON.stringify(obj));
  let bin=''; for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  return 'ESP1-'+btoa(bin);
}
function decodeState(code){
  const b64=String(code||'').trim().replace(/\s+/g,'').replace(/^ESP1-/,'');
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return JSON.parse(new TextDecoder().decode(bytes));
}
function savePlannerLocal(){ try{ if(plannerState.year) localStorage.setItem(LS_KEY, JSON.stringify({s:serialisePlanner(),t:Date.now()})); }catch(e){} }
function loadPlannerLocal(){ try{ const raw=localStorage.getItem(LS_KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; } }
function clearPlannerLocal(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }
function markChanged(){ savePlannerLocal(); }
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr+"T00:00:00"); if(isNaN(d)) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}
function autoDraft(deadline){
  if(!deadline) return "";
  const d=new Date(deadline+"T00:00:00"); if(isNaN(d)) return "";
  d.setDate(d.getDate()-3);
  return d.toISOString().slice(0,10);
}
function fmtDate(s){ if(!s) return ""; const d=new Date(s+"T00:00:00"); if(isNaN(d)) return s; return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }

            <div style="font-size:.9rem;color:var(--muted);margin-top:4px">Extended Diploma — Unit 5 plus your Year 2 optional units.</div>

      c.querySelectorAll('.quick-year').forEach(b=>{
        b.onmouseenter=()=>b.style.borderColor='var(--navy)';
        b.onmouseleave=()=>b.style.borderColor='var(--line)';
        b.onclick=()=>{plannerState.name="";plannerState.group="";plannerState.year=b.dataset.y; seedPlanner(); savePlannerLocal(); route('planner');};
      });
      return;
    }

    const yearLabel=plannerState.year==='y1'?'Year 1 — Foundation Diploma':'Year 2 — Extended Diploma';
    c.appendChild(el(`<div class="save-callout">
      <strong>Save your work →</strong> Your planner saves automatically on this computer as you go. But if you use a <strong>shared college PC</strong>, that save can be wiped when you log off — so before you leave, scroll to <strong>step 4</strong> and create a <strong>save code</strong>. Keep that code and you can reload everything on any device, any time.
    </div>`));
    c.appendChild(el(`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
        <h3 style="margin-bottom:0">1. Your details</h3>

      </div>
      <div style="margin-top:12px;max-width:420px"><label class="fld" for="plName">Your name</label><input id="plName" type="text" value="${esc(plannerState.name)}" placeholder="First and last name"></div>
    </div>`));
    $('plName').oninput=e=>{plannerState.name=e.target.value;markChanged();};
    $('plChangeYear').onclick=()=>{
      if(confirm('Change year? This will reset your planner table.')){plannerState.year=null;plannerState.rows=[];route('planner');}
    };

    c.appendChild(el(`<div class="card" style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <h3 style="margin-bottom:0">2. Your assignments &amp; deadlines</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">

      <p style="font-size:.84rem;color:var(--muted);margin:8px 0 4px">Enter the deadlines your lecturer gives you in the course assessment plan. When you set a deadline, a draft-by date 3 days earlier is suggested — change it to suit you.</p>

      <div style="overflow-x:auto"><div id="plRows" style="min-width:860px"></div></div>
    </div>`));
    $('plAdd').onclick=()=>{plannerState.rows.push({unit:UNITS[0].n,task:"",deadline:"",draftby:"",target:"M",status:"Not started",notes:""});markChanged();renderPlanRows();};
    $('plSort').onclick=()=>{plannerState.rows.sort((a,b)=>{if(!a.deadline)return 1;if(!b.deadline)return -1;return a.deadline.localeCompare(b.deadline);});markChanged();renderPlanRows();};

      <div style="display:flex;gap:10px;flex-wrap:wrap">

        <button class="btn btn-primary" id="dlPdf">Download PDF</button>
      </div>
      <div class="notice" style="margin-top:14px"><b>Tip:</b> work backwards from each deadline. Setting your own draft-complete date a few days early — and always meeting the first deadline — keeps a resubmission possible if you need it.</div>

    $('dlXlsx').onclick=downloadPlannerXlsx;
    $('dlDocx').onclick=downloadPlannerDocx;
    $('dlPdf').onclick=downloadPlannerPdf;

    c.appendChild(el(`<div class="card save-card" style="margin-top:16px">

      <p style="font-size:.9rem;color:var(--ink);margin-bottom:10px">Your planner saves automatically on this device. To move between home and college, or to back it up in case a shared computer is wiped, create a <strong>save code</strong> below.</p>

          <div style="margin-top:8px"><button class="btn btn-primary" id="plRestoreBtn">Restore this planner</button></div>

function renderPlanRows(){
  const wrap=$('plRows'); if(!wrap) return; wrap.innerHTML='';
  const cols='1.1fr 1.6fr 1fr 1fr .8fr 1.1fr 1.5fr auto';
  const head=el('<div class="unit-row" style="grid-template-columns:'+cols+';font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px"></div>');
  ['Unit','Assignment / task','Deadline','Draft by','Target','Status','Notes',''].forEach(h=>head.appendChild(el('<div>'+h+'</div>')));
  wrap.appendChild(head);

  plannerState.rows.forEach((r,idx)=>{
    const meta=STATUS_META[r.status]||STATUS_META["Not started"];
    const row=el('<div class="unit-row" style="grid-template-columns:'+cols+';align-items:center;gap:8px;background:'+meta.bg+';border-left:4px solid '+meta.text+';border-radius:8px;padding:8px 10px;margin-bottom:6px"></div>');
    // unit
    const uSel=el('<select></select>');
    UNITS.forEach(u=>{const o=el('<option value="'+u.n+'">U'+u.n+'</option>');if(u.n===r.unit)o.selected=true;uSel.appendChild(o);});
    uSel.title="Unit"; uSel.onchange=()=>{r.unit=Number(uSel.value);markChanged();};
    row.appendChild(uSel);
    // task
    const task=el('<input type="text" placeholder="Task name" value="'+esc(r.task)+'">');
    task.oninput=()=>{r.task=task.value;markChanged();};
    row.appendChild(task);
    // deadline
    const dl=el('<input type="date" value="'+esc(r.deadline)+'">');
    dl.onchange=()=>{r.deadline=dl.value; if(!r.draftby) r.draftby=autoDraft(dl.value); markChanged(); renderPlanRows();};
    row.appendChild(dl);
    // draft by
    const db=el('<input type="date" value="'+esc(r.draftby)+'">');
    db.onchange=()=>{r.draftby=db.value;markChanged();};
    row.appendChild(db);
    // target
    const tg=el('<select><option>P</option><option>M</option><option>D</option></select>');
    tg.value=r.target; tg.onchange=()=>{r.target=tg.value;markChanged();};
    row.appendChild(tg);
    // status
    const st=el('<select style="font-weight:600;color:'+meta.text+'"></select>');
    STATUSES.forEach(s=>{const o=el('<option>'+s+'</option>');if(s===r.status)o.selected=true;st.appendChild(o);});
    st.onchange=()=>{r.status=st.value;markChanged();renderPlanRows();};
    row.appendChild(st);
    // notes
    const nt=el('<input type="text" placeholder="Notes" value="'+esc(r.notes)+'">');
    nt.oninput=()=>{r.notes=nt.value;markChanged();};
    row.appendChild(nt);
    // delete + countdown
    const wrapDel=el('<div style="display:flex;flex-direction:column;align-items:flex-end"></div>');
    const du=daysUntil(r.deadline);
    if(du!==null){
      let col=du<0?'var(--accent)':(du<=7?'var(--merit)':'var(--muted)');
      let txt=du<0?Math.abs(du)+'d ago':(du===0?'today':du+'d');
      wrapDel.appendChild(el('<span style="font-size:.72rem;font-weight:700;color:'+col+'">'+txt+'</span>'));
    }
    const del=el('<button class="del-btn" aria-label="Remove task">✕</button>');
    del.onclick=()=>{plannerState.rows.splice(idx,1);markChanged();renderPlanRows();};
    wrapDel.appendChild(del);
    row.appendChild(wrapDel);
    wrap.appendChild(row);
  });
  if(!plannerState.rows.length) wrap.appendChild(el('<p style="font-size:.9rem;color:var(--muted)">No tasks yet — add one with the button above.</p>'));
}

function plannerExportData(){
  const headers=["Unit","Assignment / task","Deadline","Draft complete by","Target","Status","Notes"];
  const sorted=[...plannerState.rows];
  const rows=sorted.map(r=>["Unit "+r.unit+": "+unitTitle(r.unit), r.task||"", fmtDate(r.deadline), fmtDate(r.draftby), r.target, r.status, r.notes||""]);
  const meta=(plannerState.name||"Student")+" · "+(plannerState.year==='y1'?'Year 1 Foundation Diploma':'Year 2 Extended Diploma')+" · generated "+new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
  return {headers,rows,meta};
}
function plannerFilename(ext){
  const safe=(plannerState.name||"Study Planner").replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'');
  return (safe||"Study_Planner")+"_Esports_Planner."+ext;
}
function downloadPlannerXlsx(){
  const {headers,rows}=plannerExportData();
  const statusColours={}; Object.entries(STATUS_META).forEach(([k,m])=>statusColours[k]=m.xlsx);
  const bytes=buildXlsx("Study Planner",headers,rows,{widths:[26,30,14,16,8,14,34],statusCol:STATUS_COL_INDEX,statusColours});
  downloadBytes(bytes, plannerFilename('xlsx'), "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
}
function downloadPlannerDocx(){
  const {headers,rows,meta}=plannerExportData();
  const statusColours={}; Object.entries(STATUS_META).forEach(([k,m])=>statusColours[k]=m.docx);
  const bytes=buildDocx("My Esports Study Planner", meta, headers, rows, {statusCol:STATUS_COL_INDEX,statusColours});
  downloadBytes(bytes, plannerFilename('docx'), "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
}
function downloadPlannerPdf(){
  const {headers,rows,meta}=plannerExportData();
  const pa=$('printArea');
  let html='<div class="print-doc"><h1>My Esports Study Planner</h1><div class="print-meta">'+esc(meta)+'</div>'+
    '<table class="print-table"><thead><tr>'+headers.map(h=>'<th>'+esc(h)+'</th>').join('')+'</tr></thead><tbody>'+
    rows.map(r=>'<tr>'+r.map((cv,ci)=>{
      if(ci===STATUS_COL_INDEX){const m=STATUS_META[cv]; return '<td style="background:'+(m?m.bg:'#fff')+';color:'+(m?m.text:'#1B2733')+';font-weight:600">'+esc(cv)+'</td>';}
      return '<td>'+esc(cv)+'</td>';
    }).join('')+'</tr>').join('')+
    '</tbody></table><p class="print-tip">Tip: work backwards from each deadline — set your draft-complete date a few days earlier, and always meet the first deadline to keep a resubmission possible.</p></div>';
  pa.innerHTML=html;
  document.body.classList.add('printing');
  window.print();
  setTimeout(()=>{document.body.classList.remove('printing');pa.innerHTML='';},500);
}
